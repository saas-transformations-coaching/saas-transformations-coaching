<script>
const hamburger = document.querySelector('.hamburger');
const mobileNav = document.querySelector('.mobile-nav');

hamburger.addEventListener('click', () => {
    mobileNav.classList.toggle('active');
});
</script>
<script>
// URL Parameter auslesen
const params = new URLSearchParams(window.location.search);
const terminTyp = params.get("typ");

// Dropdown auswählen
const select = document.querySelector("select");

// Titel oben ändern
const titel = document.querySelector(".anmeldung-titel h1");

// Zuordnung
if (terminTyp === "erstsitzung") {
    select.value = "Erstsitzung";
    titel.textContent = "Anmeldung – Erstsitzung";
}

if (terminTyp === "folgesitzung") {
    select.value = "Folgesitzung";
    titel.textContent = "Anmeldung – Folgesitzung";
}

if (terminTyp === "intensiv") {
    select.value = "Intensiv‑Session";
    titel.textContent = "Anmeldung – Intensiv‑Session";
}
</script>
